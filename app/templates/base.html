<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}WorkBoard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class'}</script>
    <style>
        *, *::before, *::after { font-family: 'Inter', system-ui, sans-serif; }
        a, button, input, select, textarea, details, summary { transition: all 0.2s ease; }

        /* Static gradient backgrounds */
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63);
            color: #e2e8f0;
            min-height: 100vh;
            will-change: auto;
        }
        html.light-mode body {
            background: linear-gradient(135deg, #e8eaf6, #c5cae9);
            color: #1e293b;
        }

        /* Glass card */
        .glass {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
        }
        html.light-mode .glass {
            background: rgba(255,255,255,0.65);
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Sidebar */
        .sidebar {
            background: rgba(15,12,41,0.95);
            width: 220px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.08);
            z-index: 50;
        }
        html.light-mode .sidebar {
            background: rgba(220,225,240,0.95);
            border-right: 1px solid rgba(255,255,255,0.3);
        }

        /* Sidebar nav items */
        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
        }
        html.light-mode .nav-item { color: rgba(30,41,59,0.6); }
        .nav-item:hover { background: rgba(255,255,255,0.05); }
        html.light-mode .nav-item:hover { background: rgba(0,0,0,0.05); }
        .nav-item.active {
            background: rgba(124,109,232,0.2);
            color: #a78bfa;
            border-left: 3px solid #7c6de8;
        }
        html.light-mode .nav-item.active { color: #6d5dcd; }
        .nav-item svg { width: 20px; height: 20px; flex-shrink: 0; }

        /* Content area */
        .main-content { margin-left: 220px; flex: 1; padding: 32px; overflow-y: auto; min-height: 100vh; }

        /* Form inputs */
        .glass-input {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 8px 12px;
            font-size: 0.875rem;
            color: inherit;
            outline: none;
        }
        html.light-mode .glass-input {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(0,0,0,0.1);
        }
        .glass-input:focus {
            border-color: #7c6de8;
            box-shadow: 0 0 0 2px rgba(124,109,232,0.3);
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.3); }
        html.light-mode .glass-input::placeholder { color: rgba(0,0,0,0.35); }

        /* Primary buttons */
        .btn-primary {
            background: #7c6de8;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 8px 18px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
        }
        .btn-primary:hover { background: #6a5dd4; }

        /* Ghost / secondary buttons */
        .btn-ghost {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 5px 12px;
            font-size: 0.75rem;
            color: inherit;
            cursor: pointer;
        }
        html.light-mode .btn-ghost {
            background: rgba(255,255,255,0.4);
            border: 1px solid rgba(0,0,0,0.08);
        }
        .btn-ghost:hover { background: rgba(255,255,255,0.1); }
        html.light-mode .btn-ghost:hover { background: rgba(0,0,0,0.05); }

        /* Glass card header */
        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 12px;
            margin-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            font-size: 0.875rem;
            font-weight: 600;
        }
        html.light-mode .card-header { border-bottom-color: rgba(0,0,0,0.08); }
        .card-header svg { width: 18px; height: 18px; color: #7c6de8; }

        /* Accent text */
        .text-accent { color: #7c6de8; }

        /* Muted text */
        .text-muted { color: rgba(255,255,255,0.4); }
        html.light-mode .text-muted { color: rgba(30,41,59,0.5); }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        /* Details / summary for forms */
        details.glass summary { cursor: pointer; padding: 14px 20px; font-size: 0.875rem; font-weight: 500; }
        details.glass summary::-webkit-details-marker { display: none; }
        details.glass summary::marker { display: none; content: ''; }

        /* Theme toggle button */
        .theme-toggle {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: inherit;
        }
        html.light-mode .theme-toggle {
            background: rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.08);
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.1); }
        html.light-mode .theme-toggle:hover { background: rgba(0,0,0,0.08); }

        /* Empty state */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
            text-align: center;
        }
        .empty-state svg { width: 48px; height: 48px; color: rgba(124,109,232,0.4); margin-bottom: 12px; }
        .empty-state p { font-size: 0.875rem; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
        html.light-mode ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); }

        /* Color input fix */
        input[type="color"] { padding: 2px; cursor: pointer; }

        /* Select styling */
        select.glass-input { appearance: auto; }
    </style>
    {% block head %}{% endblock %}
</head>
<body class="flex">
    <!-- Sidebar -->
    <nav class="sidebar">
        <div style="padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.08);">
            <div style="display:flex; align-items:center; gap:10px;">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#7c6de8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v3"/>
                </svg>
                <span style="font-size:1.15rem; font-weight:700; letter-spacing:-0.02em;">WorkBoard</span>
            </div>
        </div>

        <div style="flex:1; padding:10px 8px; display:flex; flex-direction:column; gap:2px;">
            <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/></svg>
                Dashboard
            </a>
            <a href="/planning/" class="nav-item {% if '/planning' in request.path %}active{% endif %}">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                Planning
            </a>
            <a href="/tasks/" class="nav-item {% if '/tasks' in request.path %}active{% endif %}">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"/></svg>
                Tâches / Missions
            </a>
            <a href="/interventions/" class="nav-item {% if '/interventions' in request.path %}active{% endif %}">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
                Interventions
            </a>
            <a href="/docs/" class="nav-item {% if '/docs' in request.path %}active{% endif %}">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                Documents
            </a>
            <a href="/notes/" class="nav-item {% if '/notes' in request.path %}active{% endif %}">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                Notes
            </a>
            <a href="/goals/" class="nav-item {% if '/goals' in request.path %}active{% endif %}">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Objectifs
            </a>
            <a href="/stats/" class="nav-item {% if '/stats' in request.path %}active{% endif %}">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                Stats
            </a>
            <a href="/pointage/" class="nav-item {% if '/pointage' in request.path %}active{% endif %}">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                Pointage
            </a>
        </div>

        <div style="padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:space-between;">
            <button class="theme-toggle" id="theme-toggle" title="Changer le thème">
                <svg id="icon-sun" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="display:none;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                <svg id="icon-moon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>
            <span class="text-muted" style="font-size:0.7rem;">v1.0</span>
            <form method="POST" action="/logout" style="margin:0;">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" style="background:none; border:none; color:#ef4444; font-size:0.7rem; cursor:pointer; padding:4px 8px; border-radius:6px;" title="Déconnexion">
                    <svg style="width:16px; height:16px;" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
                </button>
            </form>
        </div>
    </nav>

    <!-- Main content -->
    <main class="main-content">
        <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
            <div class="glass" style="padding:8px 16px; display:flex; align-items:center; gap:12px; font-size:0.85rem;">
                <span id="live-date" class="text-muted"></span>
                <span id="live-time" style="font-weight:600; font-variant-numeric:tabular-nums;"></span>
            </div>
        </div>
        {% block content %}{% endblock %}
    </main>

    {% block scripts %}{% endblock %}

    <script>
    (function() {
        const html = document.documentElement;
        const toggle = document.getElementById('theme-toggle');
        const iconSun = document.getElementById('icon-sun');
        const iconMoon = document.getElementById('icon-moon');

        function applyTheme(light) {
            if (light) {
                html.classList.add('light-mode');
                iconSun.style.display = 'block';
                iconMoon.style.display = 'none';
            } else {
                html.classList.remove('light-mode');
                iconSun.style.display = 'none';
                iconMoon.style.display = 'block';
            }
        }

        // Init: localStorage first, then prefers-color-scheme
        const stored = localStorage.getItem('theme');
        if (stored) {
            applyTheme(stored === 'light');
        } else {
            applyTheme(window.matchMedia('(prefers-color-scheme: light)').matches);
        }

        toggle.addEventListener('click', function() {
            const isLight = html.classList.contains('light-mode');
            applyTheme(!isLight);
            localStorage.setItem('theme', !isLight ? 'light' : 'dark');
        });
    })();
    </script>

    <script>
    (function() {
        var elDate = document.getElementById('live-date');
        var elTime = document.getElementById('live-time');
        function updateClock() {
            var now = new Date();
            elDate.textContent = now.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
            elDate.textContent = elDate.textContent.charAt(0).toUpperCase() + elDate.textContent.slice(1);
            elTime.textContent = now.toLocaleTimeString('fr-FR');
        }
        updateClock();
        setInterval(updateClock, 1000);
    })();
    </script>
</body>
</html>
