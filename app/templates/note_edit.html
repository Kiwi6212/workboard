{% extends "base.html" %}
{% block title %}{{ 'Modifier' if note else 'Nouvelle' }} note — WorkBoard{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    #preview { min-height: 300px; }
    #preview h1, #preview h2, #preview h3 { font-weight: bold; margin: .5em 0; }
    #preview h1 { font-size: 1.5em; }
    #preview h2 { font-size: 1.25em; }
    #preview h3 { font-size: 1.1em; }
    #preview p { margin: .5em 0; }
    #preview ul, #preview ol { padding-left: 1.5em; margin: .5em 0; }
    #preview ul { list-style: disc; }
    #preview ol { list-style: decimal; }
    #preview code { background: #1f2937; padding: .15em .3em; border-radius: .25em; font-size: .9em; }
    #preview pre { background: #1f2937; padding: 1em; border-radius: .5em; overflow-x: auto; }
    #preview blockquote { border-left: 3px solid #4b5563; padding-left: 1em; color: #9ca3af; }
    #preview a { color: #60a5fa; text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<form method="POST" id="note-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="flex items-center justify-between mb-6">
        <input name="titre" id="titre" value="{{ note.titre if note else '' }}" placeholder="Titre de la note" required
               class="text-2xl font-bold bg-transparent border-none outline-none w-full">
        <div class="flex gap-2">
            <a href="/notes/" class="px-4 py-2 bg-gray-800 rounded-lg text-sm hover:bg-gray-700 transition">Retour</a>
            <button type="submit" class="px-4 py-2 bg-blue-600 rounded-lg text-sm hover:bg-blue-700 transition font-medium">Sauvegarder</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div>
            <label class="text-xs text-gray-500 mb-1 block">Markdown</label>
            <textarea name="contenu_md" id="editor" rows="20"
                      class="w-full bg-gray-900 rounded-xl border border-gray-800 p-4 text-sm font-mono resize-y outline-none focus:border-blue-500">{{ note.contenu_md if note else '' }}</textarea>
        </div>
        <div>
            <label class="text-xs text-gray-500 mb-1 block">Aperçu</label>
            <div id="preview" class="bg-gray-900 rounded-xl border border-gray-800 p-4 text-sm overflow-y-auto"></div>
        </div>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

function render() {
    preview.innerHTML = marked.parse(editor.value);
}
editor.addEventListener('input', render);
render();

{% if note %}
// Auto-save every 30 seconds
setInterval(() => {
    fetch('/notes/autosave/{{ note.id }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            titre: document.getElementById('titre').value,
            contenu_md: editor.value
        })
    });
}, 30000);
{% endif %}
</script>
{% endblock %}
