{% extends "base.html" %}
{% block title %}{{ 'Modifier' if note else 'Nouvelle' }} note — WorkBoard{% endblock %}
{% block head %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
    #preview { min-height: 300px; }
    #preview h1, #preview h2, #preview h3 { font-weight: bold; margin: .5em 0; }
    #preview h1 { font-size: 1.5em; }
    #preview h2 { font-size: 1.25em; }
    #preview h3 { font-size: 1.1em; }
    #preview p { margin: .5em 0; }
    #preview ul, #preview ol { padding-left: 1.5em; margin: .5em 0; }
    #preview ul { list-style: disc; }
    #preview ol { list-style: decimal; }
    #preview code { background: rgba(255,255,255,0.08); padding: .15em .3em; border-radius: .25em; font-size: .9em; }
    html.light-mode #preview code { background: rgba(0,0,0,0.06); }
    #preview pre { background: rgba(255,255,255,0.05); padding: 1em; border-radius: .5em; overflow-x: auto; }
    html.light-mode #preview pre { background: rgba(0,0,0,0.04); }
    #preview blockquote { border-left: 3px solid #7c6de8; padding-left: 1em; opacity: 0.7; }
    #preview a { color: #7c6de8; text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<form method="POST" id="note-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:24px;">
        <input name="titre" id="titre" value="{{ note.titre if note else '' }}" placeholder="Titre de la note" required
               class="glass-input" style="font-size:1.5rem; font-weight:700; background:transparent; border:none; flex:1; padding:0;">
        <div style="display:flex; gap:8px;">
            <a href="/notes/" class="btn-ghost" style="text-decoration:none; padding:8px 16px;">Retour</a>
            <button type="submit" class="btn-primary">Sauvegarder</button>
        </div>
    </div>

    <div style="display:grid; grid-template-columns:1fr 1fr; gap:20px;">
        <div>
            <label class="text-muted" style="font-size:0.75rem; margin-bottom:6px; display:block;">Markdown</label>
            <textarea name="contenu_md" id="editor" rows="20"
                      class="glass-input" style="width:100%; font-family:monospace; resize:vertical; border-radius:16px; padding:16px;">{{ note.contenu_md if note else '' }}</textarea>
        </div>
        <div>
            <label class="text-muted" style="font-size:0.75rem; margin-bottom:6px; display:block;">Aperçu</label>
            <div id="preview" class="glass" style="padding:16px; font-size:0.875rem; overflow-y:auto;"></div>
        </div>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

function render() {
    preview.innerHTML = marked.parse(editor.value);
}
editor.addEventListener('input', render);
render();

{% if note %}
// Auto-save every 30 seconds
setInterval(() => {
    fetch('/notes/autosave/{{ note.id }}', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            titre: document.getElementById('titre').value,
            contenu_md: editor.value
        })
    });
}, 30000);
{% endif %}
</script>
{% endblock %}
